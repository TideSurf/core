name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # Build landing site
      - run: bun install
        working-directory: website/landing
      - run: bun run build
        working-directory: website/landing

      # Build docs site
      - run: bun install
        working-directory: website/docs
      - run: bun run build
        working-directory: website/docs

      # Merge into single output: landing at /, docs at /docs/
      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r website/landing/dist/* _site/
          cp -r website/docs/dist/* _site/docs/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
