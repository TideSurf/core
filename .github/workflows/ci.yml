name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
      - run: bun install
      - run: bun run test:integration
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

  release-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: bun install
      - run: bun run typecheck:mcp
      - run: bun install
        working-directory: website/landing
      - run: bun run build
        working-directory: website/landing
      - run: bun install
        working-directory: website/docs
      - run: bun run build
        working-directory: website/docs
      - run: npm pack --dry-run
