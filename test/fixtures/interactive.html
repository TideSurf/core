<html>
<head><title>Interactive Test</title></head>
<body>
  <h1>Interactive Page</h1>

  <input type="text" id="search" placeholder="Search..." />

    <option value="blue">Blue</option>
    <option value="green">Green</option>
  </select>
</body>
</html>
